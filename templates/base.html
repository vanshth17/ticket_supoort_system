<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Ticket System{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        nav {
            margin-bottom: 20px;
        }
        nav a, nav button {
            margin-right: 10px;
        }
    </style>
</head>
<body>

<nav>
    <a href="/">Home</a>
    <a href="/tickets/">My Tickets</a>

    <form method="post" action="/accounts/logout/" style="display:inline;">
        {% csrf_token %}
        <button type="submit">Logout</button>
    </form>
</nav>

<hr>

{% block content %}
{% endblock %}

</body>
</html>
