<h2>My Tickets</h2>

<ul>
  {% for ticket in tickets %}
    <li>
      <a href="{% url 'ticket_detail' ticket.id %}">
        {{ ticket.title }}
      </a>
      - {{ ticket.status }}
    </li>
  {% empty %}
    <li>No tickets created yet.</li>
  {% endfor %}
</ul>

<br>

<a href="{% url 'create_ticket' %}">Create New Ticket</a>
